packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

publicHoistPattern:
  - "*babel*"
  - "babel-preset-expo"
  - "nativewind"

allowBuilds:
  "@swc/core": true
  better-sqlite3: true
  turbo: true
  "@shopify/react-native-skia": true
  "@nestjs/core": false
  "@scarf/scarf": false
  "@tree-sitter-grammars/tree-sitter-yaml": false
  core-js: false
  core-js-pure: false
  es5-ext: false
  esbuild: false
  msw: false
  protobufjs: false
  sharp: false
  tree-sitter: false
  tree-sitter-json: false

overrides:
  react: "catalog:react19"
  react-dom: "catalog:react19"
  lodash: "^4.18.0"
  shell-quote: "^1.8.4"

patchedDependencies:
  react-native-usb-serialport-for-android: patches/react-native-usb-serialport-for-android.patch
  "@better-auth/expo@1.5.6": patches/@better-auth__expo@1.5.6.patch

catalog:
  axios: 1.16.1
  typescript: 5.9.3
  zod: 3.25.76
  eslint: 9.39.4
  prettier: 3.5.3
  react-hook-form: 7.72.0
  tailwindcss: 3.4.19
  "@types/node": 22.19.15
  nodemailer: 8.0.5
  "@types/nodemailer": 7.0.11
  posthog-js: 1.364.1
  posthog-node: 5.28.8
  next: 16.2.6

catalogs:
  react19:
    react: 19.2.4
    react-dom: 19.2.4
    "@types/react": 19.2.14
    "@types/react-dom": 19.2.3
  react-query:
    "@tanstack/react-query": 5.95.2
    "@tanstack/react-query-devtools": 5.95.2
    "@tanstack/query-async-storage-persister": 5.95.2
    "@tanstack/react-query-persist-client": 5.95.2
  testing:
    vitest: 4.1.4
    jsdom: 26.1.0
    "@vitest/coverage-v8": 4.1.4
    "@vitest/ui": 4.1.4
    "@testing-library/react": 16.3.2
    "@testing-library/jest-dom": 6.9.1
    "@testing-library/user-event": 14.6.1
    "@vitejs/plugin-react": 4.7.0
  aws-sdk:
    "@aws-sdk/client-cognito-identity": 3.1048.0
    "@aws-sdk/client-iot": 3.1048.0
    "@aws-sdk/client-location": 3.1048.0
    "@aws-sdk/client-lambda": 3.1048.0
    "@aws-sdk/client-s3": 3.1048.0
    "@aws-sdk/s3-request-presigner": 3.1048.0
