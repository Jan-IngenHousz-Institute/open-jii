name: "Setup Node.js and pnpm"
description: "Sets up Node.js and pnpm with caching and optional hoisted installation"
inputs:
  node-version:
    description: "Node.js version"
    required: true
    default: "24"
  hoisted:
    description: "Use hoisted node linker (required for AWS Lambda deployments)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache pnpm Store
      uses: actions/cache@v6
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}-${{ inputs.hoisted }}
        restore-keys: |
          ${{ runner.os }}-pnpm-${{ inputs.hoisted }}-
          ${{ runner.os }}-pnpm-

    - name: Install Dependencies (Standard)
      if: inputs.hoisted == 'false'
      shell: bash
      run: |
        echo "Installing dependencies with standard pnpm (symlinks)..."
        pnpm install --frozen-lockfile

    - name: Install Dependencies (Hoisted)
      if: inputs.hoisted == 'true'
      shell: bash
      run: |
        echo "Installing dependencies with hoisted node linker (AWS Lambda compatible)..."
        # Persist the setting in pnpm-workspace.yaml (job-local checkout) instead of a
        # one-shot CLI flag: pnpm 11's verifyDepsBeforeRun otherwise treats the hoisted
        # tree as stale on the next `pnpm run` and silently reinstalls it symlinked.
        printf '\nnodeLinker: hoisted\n' >> pnpm-workspace.yaml
        pnpm install --frozen-lockfile
