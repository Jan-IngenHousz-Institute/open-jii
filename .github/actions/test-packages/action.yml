name: "Test Packages"
description: "Tests affected packages"

inputs:
  affected_apps:
    description: "JSON array of affected app names"
    required: true
  codecov-token:
    description: "Codecov token for uploading coverage"
    required: true
  skip-coverage:
    description: "Skip coverage upload (e.g., for Dependabot PRs)"
    required: false
    default: "false"
  macro-sb-test-key:
    description: "AES key for decrypting macro-sandbox test scripts"
    required: false

runs:
  using: "composite"
  steps:
    - name: Run Tests
      id: run-tests
      shell: bash
      env:
        MACRO_SB_TEST_KEY: ${{ inputs.macro-sb-test-key }}
      run: |
        echo "🧪 Testing affected packages"

        AFFECTED_APPS='${{ inputs.affected_apps }}'
        mapfile -t APPS < <(jq -r '.[]' <<<"$AFFECTED_APPS")

        TEST_ARGS=()
        for APP in "${APPS[@]}"; do
          TEST_ARGS+=("--filter=$APP")
        done

        echo "Running: pnpm turbo run test ${TEST_ARGS[*]}"

        TEST_LOG="$(mktemp)"
        pnpm turbo run test "${TEST_ARGS[@]}" 2>&1 | tee "$TEST_LOG"
        EXIT_CODE=${PIPESTATUS[0]}

        if [ $EXIT_CODE -ne 0 ]; then
          echo ""
          echo "❌ Test command failed (exit code: $EXIT_CODE)"
          echo "🔎 Running each affected app test individually to pinpoint failures"
          FAILED_APPS=()
          for APP in "${APPS[@]}"; do
            echo ""
            echo "▶️ Running: pnpm turbo run test --filter=$APP"
            if pnpm turbo run test "--filter=$APP"; then
              echo "✅ Passed: $APP"
            else
              echo "❌ Failed: $APP"
              FAILED_APPS+=("$APP")
            fi
          done

          if [ ${#FAILED_APPS[@]} -gt 0 ]; then
            echo ""
            echo "🧵 Re-running failed app(s) with full logging/debug output"
            for FAILED_APP in "${FAILED_APPS[@]}"; do
              echo ""
              echo "🐛 Debug run for $FAILED_APP"
              echo "▶️ Running: pnpm turbo run test --filter=$FAILED_APP --output-logs=full --summarize"
              if pnpm turbo run test "--filter=$FAILED_APP" --output-logs=full --summarize; then
                echo "✅ Debug run passed: $FAILED_APP"
              else
                echo "❌ Debug run failed: $FAILED_APP"
              fi
            done
          fi

          echo ""
          echo "📄 Last 200 lines from the original failed run:"
          tail -n 200 "$TEST_LOG"
        fi

        SEARCH_ROOTS=()
        for d in apps tooling packages; do
          [ -d "$d" ] && SEARCH_ROOTS+=("$d")
        done

        if [ ${#SEARCH_ROOTS[@]} -eq 0 ]; then
          COVERAGE_FILES=""
        else
          # Do not fail the workflow if one search root is inaccessible/missing.
          COVERAGE_FILES=$(find "${SEARCH_ROOTS[@]}" -maxdepth 2 -name "coverage.json" -type f 2>/dev/null || true)
        fi

        if [ -z "$COVERAGE_FILES" ]; then
          echo "⚠️ No coverage files were generated; skipping Codecov upload"
          echo "has_coverage=false" >> $GITHUB_OUTPUT
        else
          echo "✅ Found coverage files:"
          echo "$COVERAGE_FILES"
          echo "has_coverage=true" >> $GITHUB_OUTPUT
        fi

        exit $EXIT_CODE

    - name: Upload coverage to Codecov
      if: inputs.skip-coverage != 'true' && steps.run-tests.outputs.has_coverage == 'true'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ inputs.codecov-token }}
        files: apps/*/coverage.json,tooling/*/coverage.json,packages/*/coverage.json
        flags: affected
        fail_ci_if_error: true
        verbose: true
        override_branch: ${{ github.head_ref }}
        override_commit: ${{ github.event.pull_request.head.sha }}
        override_pr: ${{ github.event.number }}
