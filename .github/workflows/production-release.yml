name: PROD Release Workflow
run-name: "PROD Release: ${{ inputs.title }}"

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Release title shown in run history (e.g. 'v1.2.3 hotfix login')"
        required: true
        type: string
      environment:
        description: "Target environment for production deployment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
      ref:
        description: "Git ref (commit SHA, branch, or tag) to deploy - leave empty to deploy current branch latest commit"
        required: false
        type: string
        default: ""
      deploy_infrastructure:
        description: "Deploy infrastructure (Tofu)"
        required: false
        type: boolean
        default: true
      deploy_all:
        description: "Deploy all applications regardless of changes"
        required: false
        type: boolean
        default: false
      deploy_app:
        description: "Comma-separated apps to force deploy (e.g. web,backend). Leave empty for change detection. Options: web, backend, migration, databricks, docs, macro-sandbox"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run: skip deploy, log which PRs would be labeled and which Linear tickets would be completed (for testing)"
        required: false
        type: boolean
        default: false

concurrency:
  group: production-deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy-environment:
    name: Deploy to ${{ inputs.environment }}
    if: ${{ !inputs.dry_run }}
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.environment }}
      ref: ${{ inputs.ref }}
      deploy_infrastructure: ${{ inputs.deploy_infrastructure }}
      deploy_all: ${{ inputs.deploy_all }}
      deploy_app: ${{ inputs.deploy_app || '' }}
    secrets: inherit

  sync-linear-release:
    name: Sync Linear Release
    needs: deploy-environment
    if: ${{ !failure() && !cancelled() && (needs.deploy-environment.result == 'success' || needs.deploy-environment.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref_name }}
          persist-credentials: false

      - name: Sync Linear release
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY_WEB }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          command: sync
          version: ${{ inputs.ref || github.ref_name }}
          stage: production
          include_paths: "apps/web/**,apps/backend/**,apps/data/**,infra/**"
          dry_run: ${{ inputs.dry_run }}

  label-deployed-prs:
    name: Label Deployed PRs
    needs: deploy-environment
    if: ${{ !failure() && !cancelled() && (needs.deploy-environment.result == 'success' || needs.deploy-environment.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Label PRs with release label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          INPUT_REF: ${{ inputs.ref }}
          TRIGGER_BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Determine the release branch from inputs or the triggering ref
          if [[ "$INPUT_REF" =~ ^release/[0-9]{8}$ ]]; then
            RELEASE_BRANCH="$INPUT_REF"
          elif [[ "$TRIGGER_BRANCH" =~ ^release/[0-9]{8}$ ]]; then
            RELEASE_BRANCH="$TRIGGER_BRANCH"
          else
            echo "No release branch detected (ref=$INPUT_REF, trigger=$TRIGGER_BRANCH). Skipping labeling."
            exit 0
          fi

          # Extract DDMMYYYY date from branch name
          RELEASE_DATE="${RELEASE_BRANCH#release/}"
          LABEL_NAME="releaseProd-${RELEASE_DATE}"
          echo "Release branch : $RELEASE_BRANCH"
          echo "Label          : $LABEL_NAME"
          echo "Dry run        : ${DRY_RUN:-false}"

          git fetch --all

          # Returns the pull_request field if the number is a PR in this repo.
          # Returns empty string for 404 (not found / cross-repo ref).
          # Exits 1 (fails the job) for auth, rate-limit, or network errors.
          get_pr_type() {
            local number="$1" err result exit_code
            err=$(mktemp)
            if result=$(gh api "repos/$REPO/issues/$number" --jq '.pull_request // empty' 2>"$err"); then
              echo "$result"
            else
              exit_code=$?
              if grep -qi "HTTP 404" "$err"; then
                echo ""
              else
                echo "API error checking #$number:" >&2
                cat "$err" >&2
                rm -f "$err"
                return $exit_code
              fi
            fi
            rm -f "$err"
          }

          # Convert DDMMYYYY → YYYYMMDD for chronological comparison
          to_sortable() { local d="$1"; echo "${d:4:4}${d:2:2}${d:0:2}"; }
          CURRENT_SORTABLE=$(to_sortable "$RELEASE_DATE")

          # Find the most recent release branch that is older than this one
          PREVIOUS_BRANCH=""
          PREVIOUS_SORTABLE=""
          while IFS= read -r line; do
            branch=$(echo "$line" | sed 's|.*origin/||' | xargs)
            if [[ "$branch" =~ ^release/([0-9]{8})$ ]] && [[ "$branch" != "$RELEASE_BRANCH" ]]; then
              date="${BASH_REMATCH[1]}"
              sortable=$(to_sortable "$date")
              if [[ "$sortable" < "$CURRENT_SORTABLE" ]]; then
                if [[ -z "$PREVIOUS_SORTABLE" || "$sortable" > "$PREVIOUS_SORTABLE" ]]; then
                  PREVIOUS_SORTABLE="$sortable"
                  PREVIOUS_BRANCH="origin/$branch"
                fi
              fi
            fi
          done < <(git branch -r | grep 'origin/release/')

          echo "Previous release branch: ${PREVIOUS_BRANCH:-none}"

          if [ -z "$PREVIOUS_BRANCH" ]; then
            echo "No previous release branch found — cannot determine PR range. Skipping."
            exit 0
          fi

          RANGE="${PREVIOUS_BRANCH}..origin/${RELEASE_BRANCH}"
          echo "Commit range: $RANGE"

          # Extract PR numbers from canonical GitHub merge/squash commit subjects only:
          # "Merge pull request #NNN" and "Title (#NNN)"
          PR_NUMBERS=$(git log "$RANGE" --format="%s" \
            | grep -oP '(?<=Merge pull request #)\d+|(?<=\(#)\d+(?=\))' \
            | sort -u || true)

          if [ -z "$PR_NUMBERS" ]; then
            echo "No PRs found in range."
            exit 0
          fi

          echo "Found PRs: $(echo "$PR_NUMBERS" | tr '\n' ' ')"

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "[DRY RUN] Verifying which numbers are PRs (not issues)..."
            for NUMBER in $PR_NUMBERS; do
              TYPE=$(get_pr_type "$NUMBER")
              if [ -z "$TYPE" ]; then
                echo "  ⏭ #$NUMBER → issue or not found, would skip"
              else
                echo "  ✓ #$NUMBER → PR, would label with '$LABEL_NAME'"
              fi
            done
            exit 0
          fi

          # Create the label if it doesn't exist
          if ! gh label list --repo "$REPO" --limit 500 --json name --jq '.[].name' | grep -qx "$LABEL_NAME"; then
            CREATE_OUTPUT=$(gh label create "$LABEL_NAME" \
              --color "0075ca" \
              --description "Deployed to production on ${RELEASE_DATE:0:2}/${RELEASE_DATE:2:2}/${RELEASE_DATE:4:4}" \
              --repo "$REPO" 2>&1) || {
              if echo "$CREATE_OUTPUT" | grep -qi "already exists"; then
                echo "Label already exists, continuing."
              else
                echo "Failed to create label: $CREATE_OUTPUT" >&2
                exit 1
              fi
            }
            echo "Created label: $LABEL_NAME"
          fi

          LABELED=0
          SKIPPED=0
          for NUMBER in $PR_NUMBERS; do
            TYPE=$(get_pr_type "$NUMBER")
            if [ -z "$TYPE" ]; then
              echo "⏭ #$NUMBER is an issue or not found, skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            if gh pr edit "$NUMBER" --add-label "$LABEL_NAME" --repo "$REPO" 2>/dev/null; then
              echo "✓ #$NUMBER"
              LABELED=$((LABELED + 1))
            else
              echo "✗ #$NUMBER (could not label)"
              SKIPPED=$((SKIPPED + 1))
            fi
          done

          echo ""
          echo "Done: $LABELED labeled, $SKIPPED skipped."
