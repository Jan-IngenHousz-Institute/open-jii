name: DEV Release Workflow
run-name: "${{ inputs.title || (github.event_name == 'push' && format('DEV auto-deploy: {0}', github.event.head_commit.message)) || format('DEV release by @{0}', github.actor) }}"

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            title:
                description: "Release title shown in run history (e.g. 'testing macro-sandbox fix')"
                required: false
                type: string
                default: ""
            environment:
                description: "Target environment for production deployment"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
            deploy_infrastructure:
                description: "Deploy infrastructure (Tofu)"
                required: false
                type: boolean
                default: true
            deploy_all:
                description: "Deploy all applications regardless of changes"
                required: false
                type: boolean
                default: false
            deploy_app:
                description: "Comma-separated apps to force deploy (e.g. web,backend). Leave empty for change detection. Options: web, backend, migration, databricks, docs, macro-sandbox"
                required: false
                type: string
                default: ""

concurrency:
    group: main-deploy-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    actions: read
    id-token: write

jobs:
    # Deploy to Dev Environment
    deploy-dev:
        name: Deploy to Dev
        uses: ./.github/workflows/deploy.yml
        with:
            environment: dev
            deploy_infrastructure: ${{ inputs.deploy_infrastructure == null && true || inputs.deploy_infrastructure }}
            deploy_all: ${{ inputs.deploy_all || false }}
            deploy_app: ${{ inputs.deploy_app || '' }}
        secrets: inherit
