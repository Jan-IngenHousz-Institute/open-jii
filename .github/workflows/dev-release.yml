name: DEV Release Workflow

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment for production deployment"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
            deploy_all:
                description: "Deploy all applications regardless of changes"
                required: false
                type: boolean
                default: false
            deploy_app:
                description: "Comma-separated apps to force deploy (e.g. web,backend). Leave empty for change detection. Options: web, backend, migration, databricks, docs"
                required: false
                type: string
                default: ""

concurrency:
    group: main-deploy-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    actions: read
    id-token: write

jobs:
    # Deploy to Dev Environment
    deploy-dev:
        name: Deploy to Dev
        uses: ./.github/workflows/deploy.yml
        with:
            environment: dev
            deploy_infrastructure: true
            deploy_all: ${{ inputs.deploy_all || false }}
            deploy_app: ${{ inputs.deploy_app || '' }}
        secrets: inherit
