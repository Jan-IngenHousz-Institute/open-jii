name: PR Workflow

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_dispatch:

# Cancel in-progress runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate_pr:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_lint_test:
    name: Build, Lint, & Test
    runs-on: ubuntu-latest
    env:
      DO_NOT_TRACK: 1
      TURBO_TELEMETRY_DISABLED: 1
      environment: "dev"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-nodejs-pnpm
        with:
          node-version: "22"
      - name: Detect Affected Packages
        id: detect
        uses: ./.github/actions/detect-affected-packages

      - name: Build Packages
        if: steps.detect.outputs.has_affected_apps == 'true'
        uses: ./.github/actions/build-packages
        with:
          affected_apps: ${{ steps.detect.outputs.affected_apps }}

      - name: Lint Packages
        if: steps.detect.outputs.has_affected_apps == 'true'
        uses: ./.github/actions/lint-packages
        with:
          affected_apps: ${{ steps.detect.outputs.affected_apps }}

      - name: Test Packages
        if: steps.detect.outputs.has_affected_apps == 'true'
        uses: ./.github/actions/test-packages
        with:
          affected_apps: ${{ steps.detect.outputs.affected_apps }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      - name: Save coverage artifacts for main branch upload
        if: steps.detect.outputs.has_affected_apps == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ github.event.pull_request.head.sha }}
          path: |
            apps/*/coverage/lcov.info
            apps/*/coverage.json
          retention-days: 1

  tofu:
    name: OpenTofu Plan
    needs: build_lint_test
    uses: ./.github/workflows/tofu.yml
    with:
      environment: "dev"
      apply: false
      tofu_version: "1.9.0"
    secrets: inherit
