# Documentation Site Deployment Workflow
# Builds the Fumadocs (Next.js static export) site and deploys to S3 with CloudFront invalidation

name: Documentation Deployment Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "The deployment environment (dev, staging, prod)"
        required: true
        type: string
      ref:
        description: "Git ref (commit SHA, branch, or tag) to deploy - leave empty to deploy current branch latest commit"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      environment:
        description: "The deployment environment (dev, staging, prod)"
        required: true
        type: string
      ref:
        description: "Git ref (commit SHA, branch, or tag) to deploy - leave empty to deploy current branch latest commit"
        required: false
        type: string
        default: ""
jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}

      - name: Get Checked Out SHA
        id: get-sha
        run: |
          ACTUAL_SHA=$(git rev-parse HEAD)
          echo "sha=$ACTUAL_SHA" >> $GITHUB_OUTPUT
          echo "Checked out SHA: $ACTUAL_SHA"

      - name: Capture Deployment Start Time
        uses: ./.github/actions/capture-dora-start

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-nodejs-pnpm
        with:
          node-version: "24"
          hoisted: "false"

      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."
          pnpm install --frozen-lockfile

      - name: Build Documentation Site
        env:
          # Only production is crawlable; dev/staging keep robots.txt Disallow.
          DOCS_INDEXABLE: ${{ inputs.environment == 'prod' && 'true' || 'false' }}
          DOCS_BASE_URL: ${{ inputs.environment == 'prod' && 'https://docs.openjii.org' || format('https://docs.{0}.openjii.org', inputs.environment) }}
          # Docs-to-platform links resolve to the platform of the same environment
          # (prod docs -> prod platform, non-prod docs -> dev platform). Matches
          # the web build's own prod-vs-dev origin split in opennext-build.
          PLATFORM_BASE_URL: ${{ inputs.environment == 'prod' && 'https://openjii.org' || 'https://dev.openjii.org' }}
        run: |
          echo "Building documentation site (Fumadocs / Next.js static export)..."
          pnpm run build --filter=docs

      - name: Check Build Output
        run: |
          echo "Verifying documentation build output..."
          if [[ ! -d "apps/docs/out" ]]; then
            echo "::error::Documentation build directory not found: apps/docs/out"
            exit 1
          fi

          echo "Documentation build directory found"
          echo "Build contents:"
          ls -la apps/docs/out/

          # Check for essential files
          if [[ ! -f "apps/docs/out/index.html" ]]; then
            echo "::warning::No index.html found in build output"
          else
            echo "✓ index.html found"
          fi

          # Check for the real 404 page served by the CloudFront error mapping
          if [[ ! -f "apps/docs/out/404.html" ]]; then
            echo "::warning::No 404.html found in build output (CloudFront serves this on 403/404)"
          else
            echo "✓ 404.html found"
          fi

          # Check build size
          BUILD_SIZE=$(du -sh apps/docs/out | cut -f1)
          echo "Build size: $BUILD_SIZE"

      - name: Run Local Documentation Validation Gate
        run: |
          pnpm --filter docs check-media-tooling
          pnpm --filter docs check-links
          pnpm --filter docs check-routing
          pnpm --filter docs check-deploy-workflow
          pnpm --filter docs validate:local

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          mask-aws-account-id: true
          role-duration-seconds: 3600 # 1 hour
          output-credentials: true

      - name: Get Infrastructure Configuration
        uses: ./.github/actions/get-infrastructure-config
        with:
          environment: ${{ inputs.environment }}
          prefix: "/docs"

      - name: Verify Infrastructure Configuration
        run: |
          echo "Verifying infrastructure configuration..."
          echo "S3 Bucket: ${{ env.DOCS_BUCKET }}"
          echo "CloudFront Distribution ID: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"

          # Verify S3 bucket access
          if [[ -n "${{ env.DOCS_BUCKET }}" ]]; then
            if aws s3api get-bucket-location --bucket "${{ env.DOCS_BUCKET }}" >/dev/null 2>&1; then
              echo "✓ S3 bucket access verified: ${{ env.DOCS_BUCKET }}"
            else
              echo "::error::S3 bucket '${{ env.DOCS_BUCKET }}' not found or not accessible"
              echo "Please ensure the infrastructure has been deployed and the bucket exists"
              exit 1
            fi
          else
            echo "::error::DOCS_BUCKET environment variable not set from infrastructure config"
            exit 1
          fi

      - name: Archive Current Site (Rollback Artifact)
        id: rollback-archive
        run: |
          DOCS_BUCKET="${{ env.DOCS_BUCKET }}"
          ROLLBACK_DIR="rollback-site"
          ARTIFACT_NAME="docs-rollback-${{ inputs.environment }}-${{ steps.get-sha.outputs.sha }}"
          ARCHIVE="${ARTIFACT_NAME}.tar.gz"

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

          echo "Archiving current bucket state before the destructive (--delete) sync..."
          echo "The docs bucket is unversioned; this artifact is the rollback source."

          mkdir -p "$ROLLBACK_DIR"

          # Mirror the live bucket to a local dir. Fail closed: a partial/missing
          # rollback mirror must stop the job before any destructive upload.
          # A successful sync that copies no objects is a valid first deploy.
          if ! aws s3 sync "s3://${DOCS_BUCKET}/" "$ROLLBACK_DIR/" --quiet; then
            echo "::error::Failed to capture the current docs bucket; refusing destructive deployment"
            exit 1
          fi

          if [[ -z "$(ls -A "$ROLLBACK_DIR" 2>/dev/null)" ]]; then
            echo "::notice::Bucket is empty (likely first deploy) - no prior site to archive."
            echo "archived=false" >> "$GITHUB_OUTPUT"
          else
            tar -czf "$ARCHIVE" -C "$ROLLBACK_DIR" .
            echo "Created rollback archive: $ARCHIVE ($(du -sh "$ARCHIVE" | cut -f1))"
            echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
            echo "archived=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Rollback Artifact
        if: steps.rollback-archive.outputs.archived == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rollback-archive.outputs.artifact_name }}
          path: ${{ steps.rollback-archive.outputs.archive }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload Documentation to S3
        id: upload-docs
        run: |
          DOCS_BUCKET="${{ env.DOCS_BUCKET }}"
          BUILD_DIR="apps/docs/out"

          echo "Uploading documentation site to S3 bucket: $DOCS_BUCKET"

          cd "$BUILD_DIR"

          # Remove routing/text classes first. The static-assets sync excludes
          # these classes, so an explicit delete ensures legacy Docusaurus HTML,
          # sitemap, and robots files cannot survive the clean replacement.
          echo "Deleting previous HTML, XML, and TXT objects..."
          aws s3 rm "s3://${DOCS_BUCKET}/" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --quiet

          # Upload all other static assets once with long cache duration. The
          # --delete reconciles stale non-HTML assets against this exact export.
          echo "Uploading static assets with long cache..."
          aws s3 sync . "s3://${DOCS_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --quiet

          # Upload HTML exactly once with no cache for clean routing/cutover.
          echo "Uploading HTML page files with no cache..."
          aws s3 sync . "s3://${DOCS_BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --quiet

          # Upload XML/TXT exactly once with the intended medium cache duration.
          echo "Uploading XML and TXT files with medium cache..."
          aws s3 sync . "s3://${DOCS_BUCKET}/" \
            --exclude "*" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "public, max-age=86400" \
            --quiet

          echo "✓ Documentation uploaded successfully to S3"
          echo "uploaded=true" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront Distribution
        if: steps.upload-docs.outputs.uploaded == 'true' && env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          CLOUDFRONT_DISTRIBUTION_ID="${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"

          echo "Creating CloudFront invalidation for distribution: $CLOUDFRONT_DISTRIBUTION_ID"

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text 2>/dev/null)

          if [[ -n "$INVALIDATION_ID" ]]; then
            echo "CloudFront invalidation created with ID: $INVALIDATION_ID"
            echo "Waiting for invalidation to complete..."
            
            # Wait for invalidation to complete (improves reliability for immediate testing)
            aws cloudfront wait invalidation-completed \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --id "$INVALIDATION_ID" 2>/dev/null
            
            echo "✅ CloudFront invalidation completed successfully"
          else
            echo "::warning::Failed to create CloudFront invalidation"
          fi

      - name: Get Documentation URLs
        id: get-urls
        run: |
          DOCS_BUCKET="${{ env.DOCS_BUCKET }}"
          CLOUDFRONT_DISTRIBUTION_ID="${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"

          # S3 website endpoint (if static website hosting is enabled)
          AWS_REGION="${{ secrets.AWS_REGION }}"
          if [[ "$AWS_REGION" == "us-east-1" ]]; then
            S3_URL="https://${DOCS_BUCKET}.s3-website.amazonaws.com"
          else
            S3_URL="https://${DOCS_BUCKET}.s3-website.${AWS_REGION}.amazonaws.com"
          fi

          echo "s3_url=$S3_URL" >> $GITHUB_OUTPUT

          # CloudFront URL
          if [[ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]]; then
            CLOUDFRONT_DOMAIN=$(aws cloudfront get-distribution \
              --id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --query "Distribution.DomainName" \
              --output text 2>/dev/null || echo "")
            
            if [[ -n "$CLOUDFRONT_DOMAIN" ]]; then
              echo "cloudfront_url=https://$CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT
            fi
          fi

          # Try to get custom domain from Route53 records
          CUSTOM_DOMAIN=""

          # Get hosted zone ID for the environment domain
          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ inputs.environment }}.openjii.org.'].Id" \
            --output text 2>/dev/null | cut -d'/' -f3 || echo "")

          if [[ -n "$HOSTED_ZONE_ID" ]]; then
            CUSTOM_DOMAIN=$(aws route53 list-resource-record-sets \
              --hosted-zone-id "$HOSTED_ZONE_ID" \
              --query "ResourceRecordSets[?Name=='docs.${{ inputs.environment }}.openjii.org.'].Name" \
              --output text 2>/dev/null || echo "")
            
            if [[ -n "$CUSTOM_DOMAIN" ]]; then
              # Remove trailing dot from domain name
              CUSTOM_DOMAIN="${CUSTOM_DOMAIN%.}"
              echo "custom_url=https://$CUSTOM_DOMAIN" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Deployed Documentation Validation Gate
        id: remote-gate
        shell: bash
        run: |
          BASE_URL="${{ steps.get-urls.outputs.custom_url }}"
          if [[ -z "$BASE_URL" ]]; then
            BASE_URL="${{ steps.get-urls.outputs.cloudfront_url }}"
          fi
          if [[ -z "$BASE_URL" ]]; then
            echo "::error::Could not resolve a custom-domain or CloudFront URL for validation"
            exit 1
          fi

          echo "Validating deployed documentation at $BASE_URL"
          pnpm --filter docs validate:deployment -- --base-url "$BASE_URL"

      - name: Publish DORA Metrics
        if: always()
        uses: ./.github/actions/publish-dora-metrics
        with:
          deployment-outcome: ${{ steps.remote-gate.outcome || steps.upload-docs.outcome || 'failure' }}
          service: "docs"
          environment: ${{ inputs.environment }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deployment Summary
        if: always()
        run: |
          echo ""
          echo "=== Documentation Deployment Summary ==="
          echo "Environment: ${{ inputs.environment }}"
          echo "S3 Bucket: ${{ env.DOCS_BUCKET }}"
          echo "Documentation Uploaded: ${{ steps.upload-docs.outputs.uploaded || 'false' }}"
          echo "Validation Gate: ${{ steps.remote-gate.outcome || 'not-run' }}"
          if [[ "${{ steps.rollback-archive.outputs.archived }}" == "true" ]]; then
            echo "Rollback Artifact: ${{ steps.rollback-archive.outputs.artifact_name }}"
          else
            echo "Rollback Artifact: not created (pre-deploy bucket was empty or capture did not complete)"
          fi

          CLOUDFRONT_DISTRIBUTION_ID="${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [[ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]]; then
            echo "CloudFront Distribution: $CLOUDFRONT_DISTRIBUTION_ID"
          else
            echo "CloudFront Distribution: Not found"
          fi

          echo ""
          echo "=== Documentation URLs ==="

          # S3 URL
          S3_URL="${{ steps.get-urls.outputs.s3_url }}"
          if [[ -n "$S3_URL" ]]; then
            echo "S3 Website: $S3_URL"
          fi

          # CloudFront URL
          CLOUDFRONT_URL="${{ steps.get-urls.outputs.cloudfront_url }}"
          if [[ -n "$CLOUDFRONT_URL" ]]; then
            echo "CloudFront URL: $CLOUDFRONT_URL"
          fi

          # Custom domain URL
          CUSTOM_URL="${{ steps.get-urls.outputs.custom_url }}"
          if [[ -n "$CUSTOM_URL" ]]; then
            echo "Custom Domain: $CUSTOM_URL"
          fi

          # Check overall deployment success
          if [[ "${{ steps.upload-docs.outputs.uploaded }}" == "true" ]]; then
            echo ""
            echo "✅ Documentation deployment completed successfully!"
            echo "📚 The documentation site has been updated in the ${{ inputs.environment }} environment"
            echo "🕒 Deployment finished at $(date)"
          else
            echo ""
            echo "❌ Documentation deployment failed"
            echo "Please check the logs above for details"
            exit 1
          fi
          echo ""
