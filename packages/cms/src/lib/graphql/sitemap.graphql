fragment sitemapPagesFields on Query {
  pageBlogPostCollection(limit: $limit, skip: $skip, locale: $locale) {
    total
    items {
      slug
      sys {
        publishedAt
      }
    }
  }
  pageLandingCollection(limit: 1, locale: $locale) {
    items {
      sys {
        publishedAt
      }
    }
  }
}


query sitemapPages($locale: String!, $limit: Int = 100, $skip: Int = 0) {
  ...sitemapPagesFields
}
