  # The JS macro sandbox and its runtime deps never touch
  # GVariant/GDateTime/GRegex/GIOChannel/GKeyFile/GDBus. Fixed upstream in
  # glib2-2.82.2-770.amzn2023 (installed: -769); awaiting AWS base image republish.
