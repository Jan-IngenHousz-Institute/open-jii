# AWS Lambda Node.js base image CVEs (public.ecr.aws/lambda/nodejs:24)
# All in AWS-managed components. Fixes require AWS to publish updated base images.
# Sandbox Lambdas are VPC-isolated with no internet access and no IAM credentials.

vulnerabilities:
  # axios in Lambda runtime SDK (/var/runtime/node_modules/@aws-sdk/).
  # Version drifts as AWS refreshes the base image; observed 1.13.5, 1.15.0.
  - id: CVE-2025-62718
    statement: >-
      axios SSRF requires proxy config that Lambda does not have.
  - id: CVE-2026-40175
    statement: >-
      axios RCE chain needs a separate prototype-pollution gadget
      that does not exist in our code.
  - id: CVE-2026-42033
    statement: >-
      HTTP transport hijack via prototype pollution. Sandbox has
      no outbound HTTP.
    expired_at: 2026-07-12
  - id: CVE-2026-42035
    statement: >-
      Header injection via prototype pollution. Sandbox has no
      outbound HTTP.
    expired_at: 2026-07-12
  - id: CVE-2026-42043
    statement: >-
      NO_PROXY bypass on crafted URL. Sandbox has no outbound HTTP.
    expired_at: 2026-07-12
  - id: CVE-2026-42264
    statement: >-
      Credential exfil via prototype-pollution gadget in HTTP
      adapter. Sandbox has no IAM creds and no outbound HTTP.
    expired_at: 2026-07-12
  - id: CVE-2026-44492
    statement: >-
      shouldBypassProxy IPv4-mapped address handling. Sandbox
      has no outbound HTTP and no proxy config.
    expired_at: 2026-07-12
  - id: CVE-2026-44494
    statement: >-
      Full MITM via prototype pollution in HTTP path. Sandbox
      has no outbound HTTP.
    expired_at: 2026-07-12
  - id: CVE-2026-44486
    statement: >-
      Proxy-Authorization header leaks to the redirect target.
      Sandbox has no outbound HTTP, no proxy config, and no IAM
      creds, so the redirect path is unreachable.
    expired_at: 2026-07-12
  - id: CVE-2026-44487
    statement: >-
      Proxy-Authorization credential leak to the origin server on
      an HTTP-to-HTTPS redirect. Sandbox has no outbound HTTP, no
      proxy config, and no IAM creds.
    expired_at: 2026-07-12
  - id: CVE-2026-44488
    statement: >-
      Unbounded resource allocation (no response throttling).
      Sandbox has no outbound HTTP, so no attacker-controlled
      response reaches axios.
    expired_at: 2026-07-12
  - id: CVE-2026-44496
    statement: >-
      ReDoS via a crafted value. Sandbox has no outbound HTTP, so
      no attacker-controlled response reaches axios.
    expired_at: 2026-07-12
  - id: GHSA-gcfj-64vw-6mp9
    statement: >-
      Node HTTP adapter can reuse an inherited proxy after interceptor
      config changes it. Sandbox has no outbound HTTP and no proxy
      configuration, so no request ever reaches the adapter's proxy logic.

  # brace-expansion in @aws-sdk (/var/runtime/node_modules/@aws-sdk/node_modules/).
  - id: CVE-2026-13149
    statement: >-
      ReDoS via exponential-time complexity. Bundled inside @aws-sdk's own
      dependency tree, not invoked by sandbox code; sandbox has no outbound
      HTTP and no IAM creds, so no attacker-controlled string ever reaches it.

  # fast-xml-builder in @aws-sdk (/var/runtime/node_modules/@aws-sdk/node_modules/).
  # Builder serializes outgoing XML for AWS APIs (S3, SQS XML).
  - id: CVE-2026-44665
    statement: >-
      Attribute-quote bypass in fast-xml-builder. Bundled inside
      @aws-sdk; sandbox has no IAM creds or outbound HTTP, so SDK
      serialization paths that invoke the builder are unreachable.
    expired_at: 2026-07-12

  # libnghttp2
  - id: CVE-2026-27135
    statement: >-
      libnghttp2 DoS via malformed HTTP/2 frames.
      Sandbox cannot make outbound HTTP/2 connections.

  # openssl - all require specific protocol usage that Lambda does not do
  - id: CVE-2026-28387
    statement: "DANE TLSA use-after-free. Lambda does not use DANE."
  - id: CVE-2026-28388
    statement: "delta CRL NULL deref. Requires X509_V_FLAG_USE_DELTAS."
  - id: CVE-2026-28389
    statement: "CMS KeyAgree NULL deref. No CMS processing."
  - id: CVE-2026-28390
    statement: "CMS EnvelopedData NULL deref. No CMS processing."
  - id: CVE-2026-31790
    statement: "RSASVE info disclosure. No RSA key encapsulation."

  - id: CVE-2026-34180
    statement: >-
      Heap buffer over-read in ASN.1 decoding. Sandbox parses no
      certificates and has no TLS. Fixed in amzn2023.0.5; awaiting
      AWS base image republish.
    expired_at: 2026-11-05

